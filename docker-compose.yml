version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proyecto_dev
    ports:
      - "3000:3000"
    volumes:
      # Refleja cambios locales en tiempo real dentro del contenedor
      - .:/app
      # Preserva node_modules del contenedor (evita sobreescritura por el volumen anterior)
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped